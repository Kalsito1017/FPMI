name: fpmi-hub

services:
  db:
    image: postgres:16
    container_name: fpmi-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fpmi
      POSTGRES_PASSWORD: fpmi
      POSTGRES_DB: fpmi
    volumes:
      - fpmi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpmi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: fpmi-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://fpmi:fpmi@db:5432/fpmi?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5174}"
      PORT: "${PORT:-3000}"
      NODE_ENV: "production"
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: sh -c "npx prisma migrate deploy && node dist/main"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fpmi-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:3001}"
      VITE_TURNSTILE_SITE_KEY: "${VITE_TURNSTILE_SITE_KEY:-1x00000000000000000000AA0000000000000000000}"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

volumes:
  fpmi-pgdata:
