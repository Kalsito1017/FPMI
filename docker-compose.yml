name: fpmi-hub

services:
  db:
    image: postgres:16
    container_name: fpmi-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fpmi
      POSTGRES_PASSWORD: fpmi
      POSTGRES_DB: fpmi
    volumes:
      - fpmi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpmi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: fpmi-pgbouncer
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://fpmi:fpmi@db:5432/fpmi"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
    ports:
      - "6432:6432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fpmi-redis
    ports:
      - "6380:6379"
    volumes:
      - fpmi-redis-data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: fpmi-backend
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://fpmi:fpmi@pgbouncer:6432/fpmi?pgbouncer=true&connection_limit=10"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5174}"
      PORT: "${PORT:-3000}"
      NODE_ENV: "production"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: sh -c "npx prisma migrate deploy && node dist/main"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fpmi-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:3001}"
      VITE_TURNSTILE_SITE_KEY: "${VITE_TURNSTILE_SITE_KEY:-1x00000000000000000000AA0000000000000000000}"
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:3001}"
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    restart: unless-stopped

volumes:
  fpmi-pgdata:
  fpmi-redis-data:
