name: fpmi-hub

services:
  db:
    image: postgres:16
    container_name: fpmi-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fpmi
      POSTGRES_PASSWORD: fpmi
      POSTGRES_DB: fpmi
    volumes:
      - fpmi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpmi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: fpmi-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://fpmi:fpmi@db:5432/fpmi?schema=public"
      JWT_SECRET: "ucwYU+y7k0MYA/V7FPXvYJJqsENHL041Yu4VwnktlK6wbR9AU7WS4xgpXTpQHo+vB1kAU0DDFlDDjNEyQsrSew=="
      TURNSTILE_SECRET_KEY: "1x0000000000000000000000000000000AA"
      CORS_ORIGIN: "http://localhost:5174"
      PORT: "3000"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run start:dev"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fpmi-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:3001"
      VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA0000000000000000000"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

volumes:
  fpmi-pgdata:
